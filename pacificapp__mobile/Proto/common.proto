syntax = "proto3";

package common;

option go_package = "github.com/pacificapp/burnout-prevention/pkg/proto/common";

// Общие типы для пагинации
message PaginationRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message PaginationResponse {
  int32 count = 1;
  int32 page = 2;
  int32 page_size = 3;
  int32 total_pages = 4;
  bool has_next = 5;
  bool has_previous = 6;
}

// Общие типы для дат
message DateRange {
  string start_date = 1; // YYYY-MM-DD
  string end_date = 2;    // YYYY-MM-DD
}

// Общий ответ с ошибкой
message ErrorResponse {
  string message = 1;
  string code = 2;
  map<string, string> details = 3;
}

