syntax = "proto3";

package stress;

option go_package = "github.com/pacificapp/burnout-prevention/pkg/proto/stress";

import "google/protobuf/timestamp.proto";
import "common.proto";

// Уровень стресса
message StressLevel {
  int64 id = 1;
  int64 user_id = 2;
  int32 level = 3; // 0-100
  string notes = 4;
  google.protobuf.Timestamp created_at = 5;
}

// Создание записи о стрессе
message CreateStressLevelRequest {
  int32 level = 1; // 0-100
  string notes = 2;
}

message CreateStressLevelResponse {
  StressLevel stress_level = 1;
}

// Получение записи о стрессе
message GetStressLevelRequest {
  int64 id = 1;
}

message GetStressLevelResponse {
  StressLevel stress_level = 1;
}

// Список записей о стрессе
message ListStressLevelsRequest {
  common.PaginationRequest pagination = 1;
  common.DateRange date_range = 2;
}

message ListStressLevelsResponse {
  repeated StressLevel stress_levels = 1;
  common.PaginationResponse pagination = 2;
}

// Обновление записи о стрессе
message UpdateStressLevelRequest {
  int64 id = 1;
  int32 level = 2; // 0-100
  string notes = 3;
}

message UpdateStressLevelResponse {
  StressLevel stress_level = 1;
}

// Удаление записи о стрессе
message DeleteStressLevelRequest {
  int64 id = 1;
}

message DeleteStressLevelResponse {
  bool success = 1;
}

// Статистика по стрессу
message GetStressStatisticsRequest {
  common.DateRange date_range = 1;
}

message StressStatistics {
  double average_level = 1;
  int32 min_level = 2;
  int32 max_level = 3;
  int32 total_records = 4;
  repeated DailyStressData daily_data = 5;
}

message DailyStressData {
  string date = 1; // YYYY-MM-DD
  double average_level = 2;
  int32 count = 3;
}

message GetStressStatisticsResponse {
  StressStatistics statistics = 1;
}

// Сервис стресса
service StressService {
  rpc CreateStressLevel(CreateStressLevelRequest) returns (CreateStressLevelResponse);
  rpc GetStressLevel(GetStressLevelRequest) returns (GetStressLevelResponse);
  rpc ListStressLevels(ListStressLevelsRequest) returns (ListStressLevelsResponse);
  rpc UpdateStressLevel(UpdateStressLevelRequest) returns (UpdateStressLevelResponse);
  rpc DeleteStressLevel(DeleteStressLevelRequest) returns (DeleteStressLevelResponse);
  rpc GetStressStatistics(GetStressStatisticsRequest) returns (GetStressStatisticsResponse);
}

