syntax = "proto3";

package work;

option go_package = "github.com/pacificapp/burnout-prevention/pkg/proto/work";

import "google/protobuf/timestamp.proto";
import "common.proto";

// Рабочая активность
message WorkActivity {
  int64 id = 1;
  int64 user_id = 2;
  string date = 3; // YYYY-MM-DD
  double duration_hours = 4;
  int32 breaks_count = 5;
  int32 breaks_total_minutes = 6;
  int32 productivity = 7; // 1-10, опционально
  string notes = 8;
  google.protobuf.Timestamp created_at = 9;
}

// Создание записи о работе
message CreateWorkActivityRequest {
  string date = 1; // YYYY-MM-DD
  double duration_hours = 2;
  int32 breaks_count = 3;
  int32 breaks_total_minutes = 4;
  int32 productivity = 5; // 1-10, опционально
  string notes = 6;
}

message CreateWorkActivityResponse {
  WorkActivity work_activity = 1;
}

// Получение записи о работе
message GetWorkActivityRequest {
  int64 id = 1;
}

message GetWorkActivityResponse {
  WorkActivity work_activity = 1;
}

// Список записей о работе
message ListWorkActivitiesRequest {
  common.PaginationRequest pagination = 1;
  common.DateRange date_range = 2;
  string date = 3; // YYYY-MM-DD, опциональный фильтр
}

message ListWorkActivitiesResponse {
  repeated WorkActivity work_activities = 1;
  common.PaginationResponse pagination = 2;
}

// Обновление записи о работе
message UpdateWorkActivityRequest {
  int64 id = 1;
  string date = 2; // YYYY-MM-DD
  double duration_hours = 3;
  int32 breaks_count = 4;
  int32 breaks_total_minutes = 5;
  int32 productivity = 6; // 1-10, опционально
  string notes = 7;
}

message UpdateWorkActivityResponse {
  WorkActivity work_activity = 1;
}

// Удаление записи о работе
message DeleteWorkActivityRequest {
  int64 id = 1;
}

message DeleteWorkActivityResponse {
  bool success = 1;
}

// Статистика по работе
message GetWorkStatisticsRequest {
  common.DateRange date_range = 1;
}

message WorkStatistics {
  double average_duration = 1;
  double average_productivity = 2;
  int32 average_breaks_count = 3;
  int32 average_breaks_duration = 4;
  int32 total_records = 5;
  string start_date = 6; // YYYY-MM-DD
  string end_date = 7;   // YYYY-MM-DD
  repeated DailyWorkData daily_data = 8;
}

message DailyWorkData {
  string date = 1; // YYYY-MM-DD
  double duration_hours = 2;
  double productivity = 3;
  int32 breaks_count = 4;
  int32 breaks_duration_minutes = 5;
}

message GetWorkStatisticsResponse {
  WorkStatistics statistics = 1;
}

// Сервис работы
service WorkService {
  rpc CreateWorkActivity(CreateWorkActivityRequest) returns (CreateWorkActivityResponse);
  rpc GetWorkActivity(GetWorkActivityRequest) returns (GetWorkActivityResponse);
  rpc ListWorkActivities(ListWorkActivitiesRequest) returns (ListWorkActivitiesResponse);
  rpc UpdateWorkActivity(UpdateWorkActivityRequest) returns (UpdateWorkActivityResponse);
  rpc DeleteWorkActivity(DeleteWorkActivityRequest) returns (DeleteWorkActivityResponse);
  rpc GetWorkStatistics(GetWorkStatisticsRequest) returns (GetWorkStatisticsResponse);
}
